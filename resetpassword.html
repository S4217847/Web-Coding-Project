<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Reset | RMIT Connect</title>
    <link rel="stylesheet" href="example.css" />
  </head>

  <body>
    <header>
      <div class="logo">RMIT CONNECT</div>
      <input
        class="searchbar"
        type="text"
        placeholder="Search RMIT Connect..."
      />

      <nav>
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">Discussions</a></li>
          <li><a href="#">My Blog</a></li>
          <li><a href="#">My Profile</a></li>
        </ul>
      </nav>
    </header>

    <div class="common-account-result-page">
      <div class="common-account-result-card">
        <h1>Password Reset Link Sent</h1>

        <p class="common-account-result-text">
          If this email address is registered, we will send a password reset
          link shortly.
        </p>

        <p class="common-account-result-message">
          Please check your inbox and follow the instructions in the email.
        </p>

        <p class="account-help">
          <a href="#" class="common-link">Log in</a>
          <span class="tbd">(TBD)</span>
        </p>
      </div>
    </div>
  </body>
</html>
