<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password | RMIT Connect</title>
    <link rel="stylesheet" href="example.css" />
  </head>

  <body>
    <header>
      <div class="logo">RMIT CONNECT</div>
      <input
        class="searchbar"
        type="text"
        placeholder="Search RMIT Connect..."
      />

      <nav>
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">Discussions</a></li>
          <li><a href="#">My Blog</a></li>
          <li><a href="#">My Profile</a></li>
        </ul>
      </nav>
    </header>

    <div class="forgot-password-page">
      <div class="forgot-password-card">
        <h1>Forgot Password?</h1>

        <p class="forgot-password-text">
          Enter your RMIT email address. We will send you a password reset link.
        </p>

        <form class="forgot-password-form">
          <label for="reset-email">RMIT Email Address</label>

          <input
            id="reset-email"
            type="email"
            placeholder="example@rmit.edu.vn"
          />

          <button class="resetbutton" type="button">Reset Password</button>
        </form>

        <p class="reset-message">
          A password reset link will be sent to your email address.
        </p>

        <p class="account-help">
          Remember your password?
          <a href="#" class="common-link">Log in</a>
          <span class="tbd">(TBD)</span>
        </p>
      </div>
    </div>
  </body>
</html>
