<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logged Out | RMIT Connect</title>
    <link rel="stylesheet" href="example.css" />
  </head>

  <body>
    <header>
      <div class="logo">RMIT CONNECT</div>
      <input
        class="searchbar"
        type="text"
        placeholder="Search RMIT Connect..."
      />

      <nav>
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">Discussions</a></li>
          <li><a href="#">My Blog</a></li>
          <li><a href="#">My Profile</a></li>
        </ul>
      </nav>
    </header>

    <div class="common-account-result-page">
      <div class="common-account-result-card">
        <h1>You have been logged out.</h1>

        <p class="common-account-result-text">
          Thank you for using RMIT Connect. You can log in again whenever you
          are ready.
        </p>

        <div class="logout-link">
          <p>
            <a href="#" class="common-link">Log in again</a>
            <span class="tbd">(TBD)</span>
          </p>

          <p>
            <a href="#" class="common-link">Back to Home</a>
            <span class="tbd">(TBD)</span>
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
