<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="example.css">
</head>
<body>
    <header>
  <div class="logo">RMIT CONNECT</div>
  <input class="searchbar" type="text" placeholder="Search RMIT Connect...">
  <nav>
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">Discussions</a></li>
      <li><a href="#">My Blog</a></li>
      <li><a href="#">My Profile</a></li>
    </ul>
  </nav>
</header>

<div class="page">
  <div class="leftbar">
    <div class="menu-card">
      <ul>
        <li><a href="#">My Feed</a></li>
        <li><a href="#">My Clubs</a></li>
        <li><a href="#">Saved Posts</a></li>
        <li><a href="#">Favourites</a></li>
        <li><a href="#">Settings</a></li>
      </ul>
    </div>

  </div>

  <div class="middle">

    <div class="postbox">
      <textarea placeholder="Share something with RMIT Connect..."></textarea>
      <div class="postfooter">
        <button class="postbtn">Post</button>
      </div>
    </div>

   
  </div>

  <div class="rightbar">

    <div class="itembar">
      <div class="itemtitle">Upcoming Events</div>
      <div class="eventitem">
        <span class="eventdate">Jul #</span> - Coding Contest
      </div>
      <div class="eventitem">
        <span class="eventdate">Jul #</span> - Something Contest
      </div>
      <div class="eventitem">
        <span class="eventdate">Jul #</span> - Contest Contest
      </div>
    </div>

    <div class="itembar">
      <div class="itemtitle">Friends Online</div>
      <div class="frienditem">
        <div class="friendavatar"></div>
        <div class="friendname">Kim</div>
      </div>
      <div class="frienditem">
        <div class="friendavatar"></div>
        <div class="friend-name">Dat</div>
      </div>
      <div class="frienditem">
        <div class="friendavatar"></div>
        <div class="friendname">Hoang</div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
