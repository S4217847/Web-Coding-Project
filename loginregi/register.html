<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RMIT Connect - Register</title>
<link href="register.css" rel="stylesheet">
</head>
<body>

<header>
  <div class="logo">RMIT CONNECT</div>
  <input class="searchBar" type="text" placeholder="Search RMIT Connect...">
  <nav>
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">Clubs</a></li>
      <li><a href="#">Events</a></li>
      <li><a href="#">Course Reviews</a></li>
      <li><a href="#">Profile</a></li>
    </ul>
  </nav>
</header>

<div class="pageWrapper">
  <div class="formCard">

    <div class="formTitle">Create Your Account</div>

    <div class="registerForm">

      <label>Username</label>
      <input type="text" placeholder="Choose a username">

      <label>Email</label>
      <input type="email" placeholder="s123456@rmit.edu.vn">

      <label>Password</label>
      <input type="password" placeholder="Enter a password">

      <label>Confirm Password</label>
      <input type="password" placeholder="Re-enter your password">

      <label>Short Description</label>
      <textarea placeholder="Describe Yourself"></textarea>

      <button class="submitBtn">Create Account</button>

    </div>

    <div class="loginPrompt">
      Already have an account? <a href="#">Log in</a>
    </div>

  </div>
</div>

</body>
</html>
