<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deactivate Account | RMIT Connect</title>
    <link rel="stylesheet" href="example.css" />
  </head>

  <body>
    <header>
      <div class="logo">RMIT CONNECT</div>
      <input
        class="searchbar"
        type="text"
        placeholder="Search RMIT Connect..."
      />

      <nav>
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">Discussions</a></li>
          <li><a href="#">My Blog</a></li>
          <li><a href="#">My Profile</a></li>
        </ul>
      </nav>
    </header>

    <div class="deactivate-page">
      <div class="deactivate-card">
        <h1>Deactivate Account</h1>

        <p class="deactivate-text">
          You are about to deactivate your RMIT Connect account.
        </p>

        <p class="deactivate-warning">
          You will not be able to log in or access your account while it is
          deactivated.
        </p>

        <form class="deactivate-form">
          <label class="deactivate-checkbox">
            <input type="checkbox" />
            I understand that my account will be deactivated.
          </label>

          <button class="deactivatebutton" type="button">
            Deactivate Account
          </button>
        </form>

        <p class="account-help">
          <a href="#" class="common-link">Cancel</a>
          <span class="tbd">(TBD)</span>
        </p>
      </div>
    </div>
  </body>
</html>
